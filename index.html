<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진정한 — 나만의 책만들기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 로딩 화면 -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p class="loading-text">책을 펼치는 중…</p>
  </div>

  <!-- 차례 버튼 -->
  <button class="toc-btn" id="tocBtn" title="차례 열기">
    <span class="toc-icon">☰</span>
    <span class="toc-label">차례</span>
  </button>

  <!-- 차례 모달 -->
  <div class="toc-modal" id="tocModal" role="dialog" aria-modal="true" aria-label="차례">
    <div class="toc-panel">
      <button class="toc-close" id="tocClose" aria-label="닫기">✕</button>
      <h2 class="toc-title">차 &nbsp; 례</h2>
      <div class="toc-list" id="tocList"></div>
    </div>
  </div>

  <!-- 본문 -->
  <main class="book-wrapper">
    <div class="book-area">
      <button class="nav-btn" id="prevBtn" aria-label="이전 페이지">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transform:scaleX(-1)"><circle cx="12" cy="12" r="10"/><path d="m10 8 4 4-4 4"/></svg>
      </button>

      <div class="stage">
        <div id="flipbook"></div>
      </div>

      <button class="nav-btn" id="nextBtn" aria-label="다음 페이지">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 8 4 4-4 4"/></svg>
      </button>
    </div>

    <div class="controls">
      <span class="page-info" id="pageInfo">1 / 166</span>
    </div>

    <p class="hint">← → 키 또는 버튼으로 넘기기 &nbsp;·&nbsp; 모서리를 드래그해도 됩니다</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
